name: Release update (Reusable)

run-name: Release update on ${{ inputs.release_branch }}

on:
  workflow_call:
    inputs:
      release_branch:
        description: 'Release branch to scan'
        required: true
        type: string
      update_branch:
        description: 'Update branch name for this release branch'
        required: true
        type: string
      dry_run:
        description: 'Perform dry run without creating PRs'
        required: false
        type: boolean
        default: false
      pr_reviewers:
        description: 'Comma-separated list of reviewers'
        required: false
        type: string
        default: ''
      pr_labels:
        description: 'Comma-separated list of labels'
        required: false
        type: string
        default: ''
    outputs:
      update_result:
        description: 'Result of the update (success/failure/skipped)'
        value: ${{ jobs.update.result }}
      updated:
        description: 'Whether updates were found'
        value: ${{ jobs.update.outputs.updated }}
      pr_created:
        description: 'Whether a PR was created'
        value: ${{ jobs.update.outputs.pr_created }}
      pr_url:
        description: 'URL of the created PR'
        value: ${{ jobs.update.outputs.pr_url }}
      pr_number:
        description: 'PR number if created or updated'
        value: ${{ jobs.update.outputs.pr_number }}
      workflow_status:
        description: 'Overall workflow status'
        value: ${{ jobs.update.outputs.workflow_status }}
      failure_reason:
        description: 'Reason for workflow failure if any'
        value: ${{ jobs.update.outputs.failure_reason }}
      new_version:
        description: 'New platform version if updated'
        value: ${{ jobs.update.outputs.new_version }}
      updates_cnt:
        description: 'Number of modules/components updated'
        value: ${{ jobs.update.outputs.updates_cnt }}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: platform-update-${{ github.repository }}-${{ inputs.release_branch }}
  cancel-in-progress: false

jobs:
  update:
    name: Update Branch
    uses: ./.github/workflows/release-update-flow.yml
    with:
      repo: ${{ github.repository }}
      release_branch: ${{ inputs.release_branch }}
      update_branch: ${{ inputs.update_branch }}
      workflow_run_number: ${{ github.run_number }}
      dry_run: ${{ inputs.dry_run }}
      pr_reviewers: ${{ inputs.pr_reviewers }}
      pr_labels: ${{ inputs.pr_labels }}
    secrets: inherit
